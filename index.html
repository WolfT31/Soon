<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Maintenance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;position:fixed}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0c12;display:flex;align-items:center;justify-content:center}
.maintenance-container{width:90%;max-width:400px;background:#0f1219;border-radius:32px;padding:2rem;text-align:center;border:1px solid rgba(74,222,128,0.2)}
.icon{font-size:3rem;margin-bottom:1rem}
h1{font-size:1.8rem;color:#fff;margin-bottom:0.5rem}
h1 span{color:#4ade80}
p{color:#94a3b8;font-size:0.9rem;margin-bottom:0.5rem}
.back-soon{display:inline-block;background:rgba(74,222,128,0.1);padding:0.5rem 1rem;border-radius:60px;color:#4ade80;font-weight:600;font-size:0.8rem;margin:0.5rem 0}
.back-soon i{display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.progress-bar{background:#1e293b;border-radius:60px;height:8px;margin:1rem 0}
.progress-fill{background:#4ade80;width:68%;height:100%;border-radius:60px;animation:shimmer 2s infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.btn{background:#15803d;border:none;padding:0.7rem 1.4rem;border-radius:60px;color:#fff;font-weight:600;cursor:pointer;margin-top:1rem;transition:0.2s}
.btn:hover{background:#166534;transform:scale(0.97)}
footer{font-size:0.65rem;color:#5b6e8c;margin-top:1rem}

/* Custom Toast/Styled Alert */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:#4ade80;padding:12px 24px;border-radius:60px;font-size:0.85rem;font-weight:500;opacity:0;transition:all 0.3s ease;z-index:9999;border:1px solid rgba(74,222,128,0.3);backdrop-filter:blur(10px);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="maintenance-container">
<div class="icon">🔧</div>
<h1>Under <span>Maintenance</span></h1>
<p>We're upgrading our systems</p>
<div class="back-soon"><i>⏳</i> Back Soon <i>⏳</i></div>
<div class="progress-bar"><div class="progress-fill"></div></div>
<button class="btn" id="notifyBtn">Notify Me</button>
<footer>Secure • Fast • Reliable</footer>
</div>

<div id="toast" class="toast">✨ We'll notify you when ready!</div>

<script>
document.getElementById('notifyBtn').addEventListener('click', function() {
  var toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(function() {
    toast.classList.remove('show');
  }, 3000);
});
</script>
</body>
</html>
